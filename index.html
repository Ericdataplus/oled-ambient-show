<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED Ambient Show</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  </style>
</head>
<body>
  <!-- Scenes register themselves on window.OLED_SCENES. Missing files fail
       harmlessly; the engine has a built-in fallback so the screen is never dead. -->
  <script src="scenes/01-nebula-drift.js"></script>
  <script src="scenes/03-flow-field.js"></script>
  <script src="scenes/04-bokeh.js"></script>
  <script src="scenes/05-metaballs.js"></script>
  <script src="scenes/06-constellation.js"></script>
  <script src="scenes/07-silk-waves.js"></script>
  <script src="scenes/08-spiral-galaxy.js"></script>
  <script src="scenes/09-rain-ripples.js"></script>
  <!-- high-density pack: fine, crisp detail that exploits the 170-PPI panel -->
  <script src="scenes/10-diamond-dust.js"></script>
  <script src="scenes/11-phyllotaxis.js"></script>
  <script src="scenes/12-filament-web.js"></script>
  <script src="scenes/13-harmonograph.js"></script>
  <script src="scenes/14-plankton-net.js"></script>
  <script src="scenes/15-crystal-lattice.js"></script>
  <script src="scenes/16-ink-tendrils.js"></script>
  <!-- realtime WebGL nebula (photo-plausible; falls back to Canvas2D) -->
  <script src="scenes/17-nebula-real.js"></script>
  <!-- wide-gamut (display-p3) continuously color-cycling scenes -->
  <script src="scenes/18-iridescence.js"></script>
  <script src="scenes/19-chroma-flow.js"></script>
  <script src="scenes/20-spectrum-plasma.js"></script>
  <script src="scenes/21-prism-rings.js"></script>
  <script src="scenes/22-spectral-veil.js"></script>
  <!-- realistic deep-space scenes -->
  <script src="scenes/23-deep-field.js"></script>
  <script src="scenes/24-milky-way.js"></script>
  <script src="scenes/25-stardust.js"></script>

  <!-- Engine boots last, after scenes have registered. -->
  <script src="engine.js"></script>
</body>
</html>
